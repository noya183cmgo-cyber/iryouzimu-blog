{{ define "main" }}
<div class="hero">
  <h1>医療事務・調剤薬局の転職ガイド</h1>
  <p>医療事務や調剤薬局で働く方、これから目指す方のための情報サイトです。資格・転職・給与のリアルをお伝えします。</p>
</div>
<h2>新着記事</h2>
<ul class="post-list">
  {{ range first 10 .Site.RegularPages }}
  <li>
    <a href="{{ .Permalink }}">{{ .Title }}</a>
    <span class="date">{{ .Date.Format "2006年1月2日" }}</span>
  </li>
  {{ end }}
</ul>
{{ end }}
